<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator - AI Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -150px;
            left: -150px;
            z-index: 0;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(118, 75, 162, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            z-index: 0;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .wrapper {
            width: 100%;
            max-width: 700px;
            position: relative;
            z-index: 1;
        }

        .container {
            background: rgba(25, 25, 35, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(102, 126, 234, 0.2);
            padding: 70px 50px;
            border: 1px solid rgba(102, 126, 234, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: #ffffff;
            font-size: 40px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -1px;
        }

        h2 {
            color: #90a4ae;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            margin: 40px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            animation: fillProgress 3s ease-out forwards;
            border-radius: 10px;
        }

        @keyframes fillProgress {
            to { width: 45%; }
        }

        .form-container {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .form-section {
            animation: slideIn 0.6s ease-out both;
        }

        .form-section:nth-child(1) { animation-delay: 0s; }
        .form-section:nth-child(2) { animation-delay: 0.1s; }
        .form-section:nth-child(3) { animation-delay: 0.2s; }
        .form-section:nth-child(4) { animation-delay: 0.3s; }
        .form-section:nth-child(5) { animation-delay: 0.4s; }
        .form-section:nth-child(6) { animation-delay: 0.5s; }
        .form-section:nth-child(7) { animation-delay: 0.6s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            color: #667eea;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input {
            padding: 14px 16px;
            border: 2px solid #3a3a4a;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background-color: #1a1a28;
            color: #e0e0e0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        select::placeholder, input::placeholder {
            color: #666;
        }

        select:hover, input:hover {
            border-color: #667eea;
            background-color: #222230;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.25);
            background-color: #1a1a28;
        }

        .input-info {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .button-wrapper {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.35);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 45px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-2px);
        }

        .reset-btn {
            background: rgba(102, 126, 234, 0.2);
            color: #90a4ae;
        }

        .reset-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            color: #b0c4ce;
        }

        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 45px;
            padding-top: 40px;
            border-top: 1px solid rgba(102, 126, 234, 0.15);
        }

        .info-card {
            background: rgba(102, 126, 234, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.15);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            background: rgba(102, 126, 234, 0.12);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-4px);
        }

        .info-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .info-title {
            color: #667eea;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            color: #90a4ae;
            font-size: 13px;
            margin-top: 4px;
        }

        .message-container {
            margin-top: 40px;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .error-message {
            background: linear-gradient(135deg, #3d1f1f 0%, #4a2b2b 100%);
            border: 2px solid rgba(244, 67, 54, 0.3);
            border-left: 5px solid #f44336;
            color: #ff7f7f;
            padding: 18px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 25px rgba(244, 67, 54, 0.2);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-message {
            background: linear-gradient(135deg, #1f3f1f 0%, #2b4a2b 100%);
            border: 2px solid rgba(76, 175, 80, 0.3);
            border-left: 5px solid #4caf50;
            color: #7fff7f;
            padding: 20px;
            border-radius: 12px;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.2);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-message strong {
            color: #90ee90;
            font-size: 22px;
            display: block;
            margin-top: 12px;
        }

        @media (max-width: 600px) {
            .wrapper {
                width: 100%;
            }

            .container {
                padding: 50px 30px;
            }

            h1 {
                font-size: 28px;
            }

            label {
                font-size: 12px;
            }

            button {
                padding: 14px 30px;
                font-size: 14px;
            }

            .button-wrapper {
                flex-direction: column;
            }

            .info-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>📊 Exam Predictor</h1>
                <h2>AI-Powered Score Prediction</h2>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <form action="{{url_for('predict_datapoint')}}" method="POST">
                <div class="form-container">
                    <div class="form-section">
                        <div class="form-group">
                            <label>👤 Gender</label>
                            <select name="gender" placeholder="Enter your gender" required>
                                <option selected disabled>Select your Gender</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>🌍 Race or Ethnicity</label>
                            <select name="ethnicity" placeholder="Enter your ethinicity" required>
                                <option selected disabled>Select Ethnicity</option>
                                <option>Group A</option>
                                <option>Group B</option>
                                <option>Group C</option>
                                <option>Group D</option>
                                <option>Group E</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>🎓 Parental Level of Education</label>
                            <select name="parental_level_of_education" placeholder="Enter your parent_education" required>
                                <option selected disabled>Select Parent Education</option>
                                <option>High School</option>
                                <option>Some College</option>
                                <option>Bachelor's Degree</option>
                                <option>Master's Degree</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>🍽️ Lunch Type</label>
                            <select name="lunch" placeholder="Enter lunch" required>
                                <option selected disabled>Select Lunch Type</option>
                                <option>Standard</option>
                                <option>Free/Reduced</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>📚 Test Preparation Course</label>
                            <select name="test_preparation_course" placeholder="Enter test_preparation_course" required>
                                <option selected disabled>Select Test Prep</option>
                                <option>completed</option>
                                <option>none</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>✍️ Reading Score (0-100)</label>
                            <input type="number" name="reading_score" placeholder="Enter reading score" min="0" max="100" required class="form-input" />
                            <span class="input-info">Must be between 0 and 100</span>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-group">
                            <label>📖 Writing Score (0-100)</label>
                            <input type="number" name="writing_score" placeholder="Enter writing score" min="0" max="100" required class="form-input" />
                            <span class="input-info">Must be between 0 and 100</span>
                        </div>
                    </div>
                </div>

                <div class="button-wrapper">
                    <button type="submit">🎯 Predict Score</button>
                    <button type="button" class="reset-btn" id="clearBtn">↻ Clear</button>
                </div>
            </form>

            <div class="info-cards">
                <div class="info-card">
                    <div class="info-icon">⚡</div>
                    <div class="info-title">Processing</div>
                    <div class="info-value">Real-time Analysis</div>
                </div>
                <div class="info-card">
                    <div class="info-icon">🎯</div>
                    <div class="info-title">Accuracy</div>
                    <div class="info-value">98% Precision</div>
                </div>
            </div>

            <div class="message-container">
                {% if error_message %}
                    <div class="error-message">
                        {{ error_message }}
                    </div>
                {% elif results is not none %}
                    <div class="success-message">
                        ✨ Prediction Result<br>
                        <strong>{{ results }}</strong>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            const clearBtn = document.getElementById('clearBtn');
            const messageContainer = document.querySelector('.message-container');

            if (clearBtn && messageContainer) {
                // Clear button - Removes only the prediction/error message
                clearBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Clear clicked!'); // Debug log
                    
                    // Only clear the prediction/error messages
                    messageContainer.innerHTML = '';
                });
            } else {
                console.log('clearBtn or messageContainer not found'); // Debug
            }

            // Input focus animation
            document.querySelectorAll('.form-input, select').forEach(input => {
                input.addEventListener('focus', function() {
                    this.style.transform = 'scale(1.02)';
                });
                input.addEventListener('blur', function() {
                    this.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
